<div class="lorebary-manager-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Lorebary Control Panel</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            
            <div class="extension_block">
                <small>Lorebary Status: <span id="lb_connection_status">Checking...</span></small>
            </div>

            <div class="extension_block">
                <div class="menu_text"><b>Installed Libraries:</b></div>
                <div id="lorebary_installed_list" class="lb-list-container">
                    <div class="lb-empty-state">No libraries detected (or Lorebary not loaded).</div>
                </div>
                <div class="lb-controls-row">
                    <button id="lb_refresh_list" class="menu_button fa fa-sync" title="Refresh List"></button>
                    <button id="lb_save_config" class="menu_button fa fa-save" title="Force Save Config"></button>
                </div>
            </div>

            <hr class="sysHR" />

            <div class="extension_block">
                <div class="menu_text"><b>Command Runner:</b></div>
                <div class="flex-container">
                    <input id="lb_search_query" class="text_pole" type="text" placeholder="Search term (e.g. 'fantasy')" />
                    <button id="lb_run_search" class="menu_button">Search</button>
                </div>
                <div class="lb-quick-actions flex-container">
                    <button id="lb_cmd_update" class="menu_button" title="Update all">Update All</button>
                    <button id="lb_cmd_help" class="menu_button" title="Show Help">Help</button>
                </div>
            </div>

        </div>
    </div>
</div>
