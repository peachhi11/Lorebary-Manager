<div class="lorebary-manager-settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>Lorebary Control Panel</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            
            <div class="extension_block">
                <small>Status: <span id="lb_connection_status">Checking...</span></small>
            </div>

            <div class="extension_block">
                <div class="menu_text"><b>Proxy Configuration</b></div>
                <small>If auto-detect fails, paste your proxy URL here (e.g., <i>https://api.lorebary.com/openai</i>).</small>
                <input id="lb_manual_url" class="text_pole" type="text" placeholder="Auto-detect (Default)" />
                <div class="flex-container" style="justify-content: flex-end; margin-top: 5px;">
                     <button id="lb_save_manual" class="menu_button fa fa-save" title="Save URL"></button>
                </div>
            </div>

            <div class="extension_block">
                <div class="menu_text"><b>Installed Libraries:</b></div>
                <div id="lorebary_installed_list" class="lb-list-container">
                    <div class="lb-empty-state">No libraries detected.</div>
                </div>
                <div class="lb-controls-row">
                    <button id="lb_refresh_list" class="menu_button fa fa-sync" title="Refresh List"></button>
                </div>
            </div>

            <hr class="sysHR" />

            <div class="extension_block">
                <div class="menu_text"><b>Search / Import:</b></div>
                <div class="flex-container">
                    <input id="lb_search_query" class="text_pole" type="text" placeholder="Search term..." />
                    <button id="lb_run_search" class="menu_button">Search</button>
                </div>
            </div>

        </div>
    </div>
</div>
